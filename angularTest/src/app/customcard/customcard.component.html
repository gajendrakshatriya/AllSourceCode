  <mat-card>  <!-- class="example-card"> -->
    <mat-card-header>
      <div mat-card-avatar class="example-header-image"></div>
      <mat-card-title>{{CardDataItem.Name}}</mat-card-title>
      <!-- <mat-card-subtitle>Dog Breed</mat-card-subtitle> -->
    </mat-card-header>
    <img mat-card-image class="card-img" src={{CardDataItem.ImageUrl}} alt="Photo of {{CardDataItem.Name}}">
    <mat-card-content>
      <p>
        {{CardDataItem.Detail}}
      </p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button mat-fab extended color="primary"><mat-icon>favorite</mat-icon>LIKE</button>
      <button mat-button color="warn">Warn</button>
      <button mat-fab extended color="primary">
        <mat-icon>favorite</mat-icon>
        Primary
      </button>
      <button mat-button>SHARE</button>
    </mat-card-actions>
  </mat-card>
